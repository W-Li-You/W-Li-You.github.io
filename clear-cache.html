<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>清除站点缓存</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: #fff; padding: 32px 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 12px; color: #333; }
    p { color: #666; margin: 0; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>正在清除旧版缓存…</h1>
    <p id="msg">请稍候，完成后将自动跳转到首页。</p>
  </div>
  <script>
    (function () {
      var msg = document.getElementById('msg');
      function done(text) {
        msg.textContent = text;
        setTimeout(function () {
          location.replace('/?t=' + Date.now());
        }, 800);
      }
      if (!('serviceWorker' in navigator)) {
        done('无需清除，正在跳转…');
        return;
      }
      navigator.serviceWorker.getRegistrations()
        .then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        })
        .then(function () {
          if (!window.caches) return;
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          });
        })
        .then(function () { done('缓存已清除，正在跳转…'); })
        .catch(function () { done('清除完成，正在跳转…'); });
    })();
  </script>
</body>
</html>
